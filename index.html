<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Portfolio Tracker</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
      /* Safe area padding for iOS notch/home bar */
      .pb-safe { padding-bottom: max(env(safe-area-inset-bottom, 0px), 8px); }
      .pt-safe { padding-top: env(safe-area-inset-top, 0px); }

      /* Animation utilities */
      .animate-in { animation-fill-mode: both; }
      .duration-200 { animation-duration: 200ms; }
      .duration-300 { animation-duration: 300ms; }
      .duration-500 { animation-duration: 500ms; }
      .duration-1000 { animation-duration: 1000ms; }

      @keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }
      @keyframes slide-in-from-bottom { from { transform: translateY(100%); } to { transform: translateY(0); } }
      @keyframes slide-in-from-bottom-8 { from { transform: translateY(2rem); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
      @keyframes zoom-in-95 { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }
      @keyframes slide-in-from-top-1 { from { transform: translateY(-0.25rem); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

      .fade-in { animation-name: fade-in; }
      .slide-in-from-bottom-full { animation-name: slide-in-from-bottom; }
      .slide-in-from-bottom-8 { animation-name: slide-in-from-bottom-8; }
      .zoom-in-95 { animation-name: zoom-in-95; }
      .slide-in-from-top-1 { animation-name: slide-in-from-top-1; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
